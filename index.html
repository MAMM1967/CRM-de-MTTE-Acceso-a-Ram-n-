<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTTE · CRM Comercial</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #050a15; color: #e2e8f0; overflow-x: hidden; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; }
        .input-dark { background: #0f172a !important; border: 1px solid #3b82f6 !important; color: white !important; border-radius: 0.75rem !important; }
        .btn-primary { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); transition: all 0.3s ease; }
        .loading { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-8 gap-6 glass-card p-6">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                <span class="text-white font-bold text-xl italic">M</span>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight">MTTE <span class="text-blue-500 italic">INDUSTRIAL</span></h1>
                <div class="flex items-center gap-2">
                    <div id="status-dot" class="w-2 h-2 rounded-full bg-yellow-500"></div>
                    <p id="connection-status" class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Esperando Configuración</p>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button id="auth-btn" onclick="handleAuthClick()" class="bg-white text-slate-900 px-6 py-2.5 rounded-xl font-bold text-xs hover:bg-blue-50 transition-colors shadow-sm">Google Contacts</button>
            <button onclick="toggleModal('config-modal', true)" class="p-2.5 bg-slate-800 rounded-xl border border-blue-500/30 hover:bg-slate-700 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        <aside class="lg:col-span-4 space-y-6">
            <div class="glass-card p-6 min-h-[500px] flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-[10px] font-black text-blue-400 uppercase tracking-[0.2em]">Google Contacts</h2>
                    <span id="google-count" class="text-[10px] bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded-full font-bold">0</span>
                </div>
                <div id="google-list" class="space-y-3 overflow-y-auto max-h-[600px] pr-2 custom-scrollbar">
                    <div class="text-center py-20 opacity-30">
                        <div class="mb-4 flex justify-center">
                            <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        </div>
                        <p class="text-xs">Conecta con Google para importar</p>
                    </div>
                </div>
            </div>
        </aside>

        <section class="lg:col-span-8">
            <div class="flex gap-8 mb-6 font-bold text-[11px] uppercase border-b border-slate-800">
                <button onclick="changeTab('Agenda')" id="tab-Agenda" class="pb-3 tab-active tracking-widest transition-all">📅 Agenda Hoy</button>
                <button onclick="changeTab('Empresas')" id="tab-Empresas" class="pb-3 text-slate-500 hover:text-white tracking-widest transition-all">🏢 Empresas</button>
                <button onclick="changeTab('Contactos')" id="tab-Contactos" class="pb-3 text-slate-500 hover:text-white tracking-widest transition-all">👥 Todos los Contactos</button>
            </div>
            <div id="st-content" class="min-h-[400px]"></div>
        </section>
    </main>

    <!-- CONFIG MODAL -->
    <div id="config-modal" class="fixed inset-0 bg-slate-950/90 hidden flex items-center justify-center z-[100] p-4 backdrop-blur-md">
        <div class="glass-card max-w-md w-full p-8 shadow-2xl border-blue-500/30">
            <h3 class="text-xl font-bold mb-2">Configuración</h3>
            <div class="space-y-5">
                <div>
                    <label class="text-[10px] text-blue-400 font-bold uppercase ml-1">SeaTable App Token</label>
                    <input type="password" id="st-token" placeholder="Token de la Base de Datos..." class="w-full input-dark px-4 py-3 mt-1.5 text-sm focus:ring-2 ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="text-[10px] text-blue-400 font-bold uppercase ml-1">Google Client ID</label>
                    <input type="text" id="google-id" placeholder="ID de cliente de Google Cloud..." class="w-full input-dark px-4 py-3 mt-1.5 text-sm focus:ring-2 ring-blue-500 outline-none">
                </div>
                <div class="pt-4">
                    <button onclick="saveConfig()" class="w-full btn-primary py-4 rounded-xl font-bold text-sm text-white shadow-lg">Guardar y Recargar</button>
                    <button onclick="toggleModal('config-modal', false)" class="w-full mt-4 text-slate-500 text-xs">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL IMPORTACIÓN -->
    <div id="import-modal" class="fixed inset-0 bg-slate-950/95 hidden flex items-center justify-center z-[100] p-4 backdrop-blur-xl overflow-y-auto">
        <div class="glass-card max-w-5xl w-full p-8 border-blue-500/20 shadow-2xl my-8">
            <div class="flex justify-between items-start mb-8">
                <div>
                    <h3 class="text-2xl font-bold">Vincular a SeaTable</h3>
                    <p class="text-xs text-slate-400 uppercase tracking-widest mt-1 font-bold">Nuevo Registro en MTTE CRM</p>
                </div>
                <button onclick="toggleModal('import-modal', false)" class="p-2 hover:bg-white/5 rounded-full">✕</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <div class="space-y-4">
                    <h4 class="text-blue-400 text-[10px] font-black uppercase border-b border-blue-500/20 pb-2">Información del Contacto</h4>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="imp-nombre" placeholder="Nombre" class="input-dark px-4 py-3 text-sm">
                        <input type="text" id="imp-ap1" placeholder="Apellido 1" class="input-dark px-4 py-3 text-sm">
                    </div>
                    <input type="text" id="imp-ap2" placeholder="Apellido 2" class="w-full input-dark px-4 py-3 text-sm">
                    <input type="email" id="imp-email" placeholder="Email" class="w-full input-dark px-4 py-3 text-sm">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="imp-tel-mov" placeholder="Móvil" class="input-dark px-4 py-3 text-sm">
                        <input type="text" id="imp-tel-fix" placeholder="Fijo" class="input-dark px-4 py-3 text-sm">
                    </div>
                    <input type="text" id="imp-cargo" placeholder="Cargo" class="w-full input-dark px-4 py-3 text-sm">
                    <input type="text" id="imp-linkedin" placeholder="LinkedIn" class="w-full input-dark px-4 py-3 text-sm">
                    <textarea id="imp-notas" placeholder="Notas..." class="w-full input-dark px-4 py-3 text-sm h-24 resize-none"></textarea>
                </div>

                <div class="space-y-4">
                    <h4 class="text-emerald-400 text-[10px] font-black uppercase border-b border-emerald-500/20 pb-2">Empresa</h4>
                    <select id="imp-select-empresa" onchange="toggleNuevaEmpresa(this.value)" class="w-full input-dark px-4 py-3 text-sm cursor-pointer">
                        <option value="NEW">+ Crear Nueva Empresa</option>
                    </select>
                    
                    <div id="new-emp-fields" class="space-y-4 pt-4 bg-emerald-500/5 p-4 rounded-2xl border border-emerald-500/10">
                        <input type="text" id="imp-emp-nombre" placeholder="Nombre Empresa" class="w-full input-dark px-4 py-3 text-sm">
                        <select id="imp-emp-tipo" class="w-full input-dark px-4 py-3 text-sm">
                            <option value="CLIENTES FINAL">CLIENTES FINAL</option>
                            <option value="ALMACÉN FRÍO">ALMACÉN FRÍO</option>
                            <option value="CARROCERO">CARROCERO</option>
                            <option value="FABRICANTES">FABRICANTES</option>
                            <option value="SERVICIO TÉCNICO">SERVICIO TÉCNICO</option>
                            <option value="SERVICIO FRÍO">SERVICIO FRÍO</option>
                            <option value="SERVICIO OFICIAL">SERVICIO OFICIAL</option>
                            <option value="COMPRA VENTA">COMPRA VENTA</option>
                            <option value="RENTING LC">RENTING LC</option>
                            <option value="RENTING TRA">RENTING TRA</option>
                            <option value="PROVEEDOR">PROVEEDOR</option>
                            <option value="RECAMBIOS">RECAMBIOS</option>
                        </select>
                        <input type="text" id="imp-emp-dir" placeholder="Dirección" class="w-full input-dark px-4 py-3 text-sm">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="imp-emp-ciu" placeholder="Ciudad" class="input-dark px-4 py-3 text-sm">
                            <input type="text" id="imp-emp-pro" placeholder="Provincia" class="input-dark px-4 py-3 text-sm">
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="mt-8 flex gap-4">
                <button onclick="executeImport()" id="btn-import" class="flex-1 btn-primary py-5 rounded-2xl font-bold text-white shadow-xl">Sincronizar en SeaTable</button>
            </div>
        </div>
    </div>

    <script>
        // Configuración y variables de estado
        let config = JSON.parse(localStorage.getItem('mtte_crm_v3')) || { token: '', googleId: '' };
        let currentTab = 'Agenda'; // Coincide con nombres de SeaTable
        let googleToken = null;
        let tokenClient = null;
        let session = { accessToken: null, dtableUuid: null, serverUrl: 'https://dtable-server.seatable.io' };

        // Centralización de nombres de tablas (Case Sensitive)
        const TABLES = {
            CONTACTOS: 'Contactos',
            EMPRESAS: 'Empresas'
        };

        function updateStatus(msg, colorClass, dotColor) {
            const el = document.getElementById('connection-status');
            const dot = document.getElementById('status-dot');
            if (el) { el.innerText = msg; el.className = `text-[10px] ${colorClass} uppercase tracking-widest font-bold`; }
            if (dot) { dot.className = `w-2 h-2 rounded-full ${dotColor}`; }
        }

        async function authenticateSeaTable() {
            if (!config.token) return false;
            try {
                updateStatus('Conectando...', 'text-blue-400', 'bg-blue-400 animate-pulse');
                const res = await fetch('https://cloud.seatable.io/api/v2.1/dtable/app-access-token/', {
                    headers: { 'Authorization': `Token ${config.token.trim()}` }
                });
                if (!res.ok) throw new Error('Auth fail');
                const data = await res.json();
                session.accessToken = data.access_token;
                session.dtableUuid = data.dtable_uuid;
                session.serverUrl = data.dtable_server.replace(/\/$/, ""); 
                updateStatus('SeaTable Conectado', 'text-emerald-500', 'bg-emerald-500 shadow-md');
                return true;
            } catch (e) {
                updateStatus('Error de Token', 'text-red-500', 'bg-red-500');
                return false;
            }
        }

        async function stRequest(tableName, method = 'GET', body = null) {
            if (!session.accessToken) {
                const ok = await authenticateSeaTable();
                if (!ok) return { error: 401 };
            }
            const url = `${session.serverUrl}/api/v1/dtables/${session.dtableUuid}/rows/?table_name=${encodeURIComponent(tableName)}`;
            try {
                const res = await fetch(url, {
                    method,
                    headers: { 
                        'Authorization': `Token ${session.accessToken}`, 
                        'Content-Type': 'application/json'
                    },
                    body: body ? JSON.stringify(body) : null
                });
                return await res.json();
            } catch (e) { return { error: 500 }; }
        }

        async function loadData() {
            const container = document.getElementById('st-content');
            container.innerHTML = '<div class="flex justify-center py-24"><div class="loading"></div></div>';
            
            // Si la pestaña es "Agenda", cargamos de la tabla "Contactos"
            const tableToFetch = (currentTab === 'Empresas') ? TABLES.EMPRESAS : TABLES.CONTACTOS;
            const data = await stRequest(tableToFetch);
            
            if (data.error || !data.rows) {
                container.innerHTML = `
                    <div class="glass-card p-12 text-center border-red-500/20">
                        <p class="text-red-400 font-bold mb-2">Error: No se encontró la tabla "${tableToFetch}"</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest">Verifica que el nombre en SeaTable sea idéntico</p>
                        <button onclick="loadData()" class="mt-6 px-6 py-2 bg-slate-800 rounded-lg text-xs font-bold">Reintentar</button>
                    </div>`;
                return;
            }
            renderData(data.rows);
        }

        function renderData(rows) {
            const container = document.getElementById('st-content');
            if (!rows.length) { 
                container.innerHTML = '<div class="text-center py-24 opacity-20"><p class="text-xs italic">Sin registros</p></div>'; 
                return; 
            }

            if (currentTab === 'Agenda') {
                container.innerHTML = rows.slice(0, 15).map(r => `
                    <div class="glass-card p-6 mb-4 flex justify-between items-center border-l-4 border-blue-500 hover:bg-white/5 transition-colors group">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-blue-500/10 flex items-center justify-center text-blue-400 font-bold text-xs">
                                ${r.Nombre ? r.Nombre[0] : '?'}
                            </div>
                            <div>
                                <h3 class="font-bold text-sm group-hover:text-blue-400 transition-colors">${r.Nombre || ''} ${r['Apellido 1'] || ''}</h3>
                                <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-0.5">${r['Nombre Empresa'] || 'PARTICULAR'}</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                             ${r.Email ? `<a href="mailto:${r.Email}" class="p-2.5 bg-blue-600/10 text-blue-400 rounded-xl hover:bg-blue-600 hover:text-white transition-all"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg></a>` : ''}
                        </div>
                    </div>
                `).join('');
            } else {
                const cols = Object.keys(rows[0]).filter(k => !k.startsWith('_'));
                container.innerHTML = `
                    <div class="glass-card overflow-hidden">
                        <div class="overflow-x-auto custom-scrollbar">
                            <table class="w-full text-[10px] text-left">
                                <thead class="bg-slate-800 text-blue-400 uppercase font-black">
                                    <tr>${cols.map(c => `<th class="p-5 whitespace-nowrap">${c}</th>`).join('')}</tr>
                                </thead>
                                <tbody class="divide-y divide-white/5">
                                    ${rows.map(r => `<tr class="hover:bg-white/[0.02]">${cols.map(c => `<td class="p-5 text-slate-300 whitespace-nowrap">${r[c] || '-'}</td>`).join('')}</tr>`).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>`;
            }
        }

        // --- GOOGLE API ---
        function handleAuthClick() {
            if (!config.googleId) { toggleModal('config-modal', true); return; }
            if (!tokenClient) initGoogle();
            tokenClient.requestAccessToken();
        }

        function initGoogle() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: config.googleId.trim(),
                scope: 'https://www.googleapis.com/auth/contacts.readonly',
                callback: (resp) => { if(resp.access_token) { googleToken = resp.access_token; fetchGoogleContacts(); } }
            });
        }

        async function fetchGoogleContacts() {
            const list = document.getElementById('google-list');
            list.innerHTML = '<div class="flex justify-center py-12"><div class="loading"></div></div>';
            try {
                const res = await fetch('https://people.googleapis.com/v1/people/me/connections?personFields=names,emailAddresses,phoneNumbers,organizations', {
                    headers: { 'Authorization': `Bearer ${googleToken}` }
                });
                const data = await res.json();
                document.getElementById('google-count').innerText = data.connections?.length || 0;
                list.innerHTML = data.connections?.map(p => {
                    const cleanObj = JSON.stringify(p).replace(/'/g, "&apos;");
                    return `<div onclick='openImport(${cleanObj})' class="bg-slate-800/40 p-4 rounded-xl border border-white/5 hover:border-blue-500 cursor-pointer transition-all">
                        <div class="font-bold text-xs">${p.names?.[0]?.displayName || 'Sin nombre'}</div>
                        <div class="text-[9px] text-slate-500 uppercase mt-1">${p.organizations?.[0]?.name || 'PARTICULAR'}</div>
                    </div>`;
                }).join('') || '<p class="text-xs opacity-30 text-center py-10">No hay contactos</p>';
            } catch (e) { list.innerHTML = '<p class="text-red-400 text-center text-xs">Error Google API</p>'; }
        }

        async function openImport(p) {
            const fullName = p.names?.[0]?.displayName || '';
            const nameParts = fullName.split(' ');
            document.getElementById('imp-nombre').value = nameParts[0] || '';
            document.getElementById('imp-ap1').value = nameParts.slice(1).join(' ') || '';
            document.getElementById('imp-email').value = p.emailAddresses?.[0]?.value || '';
            document.getElementById('imp-tel-mov').value = p.phoneNumbers?.[0]?.value || '';
            document.getElementById('imp-emp-nombre').value = p.organizations?.[0]?.name || '';
            document.getElementById('imp-cargo').value = p.organizations?.[0]?.title || '';
            
            toggleModal('import-modal', true);
            const sel = document.getElementById('imp-select-empresa');
            sel.innerHTML = '<option value="">Cargando empresas...</option>';
            const emps = await stRequest(TABLES.EMPRESAS);
            sel.innerHTML = '<option value="NEW">+ Crear Nueva Empresa</option>' + (emps.rows || []).map(e => `<option value="${e['Nombre Empresa']}">${e['Nombre Empresa']}</option>`).join('');
        }

        async function executeImport() {
            const btn = document.getElementById('btn-import');
            btn.disabled = true; btn.innerText = "Sincronizando...";

            let empNom = document.getElementById('imp-emp-nombre').value;
            let empSel = document.getElementById('imp-select-empresa').value;
            let finalEmpresa = (empSel === 'NEW') ? empNom : empSel;

            if (empSel === 'NEW' && empNom) {
                await stRequest(TABLES.EMPRESAS, 'POST', { row: {
                    "Nombre Empresa": empNom,
                    "Tipo Empresa": document.getElementById('imp-emp-tipo').value,
                    "Dirección": document.getElementById('imp-emp-dir').value,
                    "Ciudad": document.getElementById('imp-emp-ciu').value,
                    "Provincia": document.getElementById('imp-emp-pro').value
                }});
            }

            await stRequest(TABLES.CONTACTOS, 'POST', { row: {
                "Nombre": document.getElementById('imp-nombre').value,
                "Apellido 1": document.getElementById('imp-ap1').value,
                "Apellido 2": document.getElementById('imp-ap2').value,
                "Email": document.getElementById('imp-email').value,
                "Teléfono móvil": document.getElementById('imp-tel-mov').value,
                "Teléfono Fijo": document.getElementById('imp-tel-fix').value,
                "Nombre Empresa": finalEmpresa,
                "Cargo": document.getElementById('imp-cargo').value,
                "Linkedin": document.getElementById('imp-linkedin').value,
                "Notas": document.getElementById('imp-notas').value
            }});

            btn.disabled = false; btn.innerText = "Sincronizar en SeaTable";
            toggleModal('import-modal', false);
            loadData();
        }

        function saveConfig() {
            config.token = document.getElementById('st-token').value.trim();
            config.googleId = document.getElementById('google-id').value.trim();
            localStorage.setItem('mtte_crm_v3', JSON.stringify(config));
            location.reload();
        }

        function toggleModal(id, show) { document.getElementById(id).classList.toggle('hidden', !show); }
        function toggleNuevaEmpresa(v) { document.getElementById('new-emp-fields').classList.toggle('hidden', v !== 'NEW'); }
        
        function changeTab(t) { 
            currentTab = t; 
            ['Agenda','Empresas','Contactos'].forEach(id => {
                const btn = document.getElementById('tab-'+id);
                if(btn) btn.className = (id === t) ? 'pb-3 tab-active tracking-widest transition-all' : 'pb-3 text-slate-500 hover:text-white tracking-widest transition-all';
            });
            loadData(); 
        }

        window.onload = () => {
            document.getElementById('st-token').value = config.token || '';
            document.getElementById('google-id').value = config.googleId || '';
            if (config.token) loadData(); else toggleModal('config-modal', true);
            if (config.googleId) setTimeout(initGoogle, 500);
        };
    </script>
</body>
</html>
