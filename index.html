<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTTE · CRM Comercial Frío Industrial</title>
    <!-- Google Identity Service -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #050a15; color: #e2e8f0; overflow-x: hidden; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; }
        .input-dark { background: #0f172a !important; border: 1px solid #3b82f6 !important; color: white !important; border-radius: 0.75rem !important; }
        .btn-primary { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4); }
        .loading { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10">

    <header class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10 gap-6 glass-card p-6">
        <div class="flex items-center gap-4">
            <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center shadow-2xl">
                <span class="text-white font-bold text-2xl italic">M</span>
            </div>
            <div>
                <h1 class="text-2xl font-bold tracking-tight">MTTE <span class="text-blue-500">CRM</span></h1>
                <p class="text-[10px] text-slate-400 uppercase tracking-widest font-semibold">Frío Industrial & Comercial</p>
            </div>
        </div>
        <div class="flex gap-4">
            <button id="auth-btn" onclick="handleAuthClick()" class="bg-white text-slate-900 px-6 py-2.5 rounded-xl font-bold text-sm shadow-lg hover:bg-slate-200 transition-colors">Google Contacts</button>
            <button onclick="toggleModal('config-modal', true)" class="p-2.5 bg-slate-800 rounded-xl border border-slate-700 hover:bg-slate-700 transition-all border-blue-500/30 shadow-[0_0_15px_rgba(59,130,246,0.2)]">⚙️ Configuración</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        <aside class="lg:col-span-4">
            <div class="glass-card p-6 min-h-[500px]">
                <h2 class="text-xs font-bold text-blue-400 uppercase mb-6 tracking-widest flex items-center gap-2">
                    <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                    Contactos de Google
                </h2>
                <div id="google-list" class="space-y-3 overflow-y-auto max-h-[600px] pr-2">
                    <div id="google-status-msg" class="text-center py-10 opacity-40 italic text-sm">
                        Carga tu Client ID en configuración.
                    </div>
                </div>
            </div>
        </aside>

        <section class="lg:col-span-8">
            <div class="flex gap-6 mb-6 font-bold text-sm uppercase tracking-wider border-b border-slate-800">
                <button onclick="changeTab('agenda')" id="tab-agenda" class="pb-3 border-b-2 border-blue-500 text-blue-500 transition-all">📅 Agenda</button>
                <button onclick="changeTab('empresas')" id="tab-empresas" class="pb-3 text-slate-500 transition-all">🏢 Empresas</button>
                <button onclick="changeTab('contactos')" id="tab-contactos" class="pb-3 text-slate-500 transition-all">👥 Todos</button>
            </div>
            <div id="st-content" class="space-y-4"></div>
        </section>
    </main>

    <!-- MODAL CONFIG -->
    <div id="config-modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="glass-card max-w-md w-full p-8 shadow-2xl">
            <h3 class="text-xl font-bold mb-8 text-center">Configuración del Sistema</h3>
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-blue-400 uppercase block mb-2">SeaTable App Token</label>
                    <input type="password" id="st-token" placeholder="Pega el App Token aquí" class="w-full input-dark px-4 py-3 text-sm">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-blue-400 uppercase block mb-2">Google Client ID</label>
                    <input type="text" id="google-id" placeholder="ID de cliente de Google Cloud" class="w-full input-dark px-4 py-3 text-sm">
                </div>
                <button onclick="saveConfig()" class="w-full btn-primary py-4 rounded-xl font-bold">Guardar y Re-conectar</button>
                <button onclick="toggleModal('config-modal', false)" class="w-full text-slate-500 text-xs">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- MODAL IMPORTACIÓN -->
    <div id="import-modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="glass-card max-w-4xl w-full p-8 border-blue-500/20 shadow-2xl">
            <h3 class="text-2xl font-bold mb-8">Vincular a CRM MTTE</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <h4 class="text-blue-400 text-xs font-bold uppercase tracking-widest pb-2 border-b border-blue-500/20">Contacto</h4>
                    <input type="text" id="imp-nombre" placeholder="Nombre" class="w-full input-dark px-4 py-3 text-sm">
                    <input type="email" id="imp-email" placeholder="Email" class="w-full input-dark px-4 py-3 text-sm">
                    <input type="text" id="imp-tel" placeholder="Teléfono" class="w-full input-dark px-4 py-3 text-sm">
                    <input type="text" id="imp-cargo" placeholder="Cargo" class="w-full input-dark px-4 py-3 text-sm">
                </div>
                <div class="space-y-4">
                    <h4 class="text-emerald-400 text-xs font-bold uppercase tracking-widest pb-2 border-b border-emerald-500/20">Empresa</h4>
                    <select id="imp-select-empresa" onchange="toggleNuevaEmpresa(this.value)" class="w-full input-dark px-4 py-3 text-sm">
                        <option value="NEW">+ Crear Nueva Empresa</option>
                    </select>
                    <div id="new-emp-fields" class="space-y-3">
                        <input type="text" id="imp-emp-nombre" placeholder="Nombre Empresa" class="w-full input-dark px-4 py-3 text-sm">
                        <select id="imp-emp-tipo" class="w-full input-dark px-4 py-3 text-sm">
                            <option value="Instaladora">Instaladora</option>
                            <option value="Mantenedora">Mantenedora</option>
                            <option value="Ingeniería">Ingeniería</option>
                            <option value="Arquitectura">Arquitectura</option>
                            <option value="Distribuidora">Distribuidora</option>
                            <option value="Otros">Otros</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="mt-10 flex gap-4">
                <button onclick="executeImport()" id="btn-import" class="flex-1 btn-primary py-4 rounded-xl font-bold">Importar al CRM</button>
                <button onclick="toggleModal('import-modal', false)" class="px-8 bg-slate-800 py-4 rounded-xl">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let config = JSON.parse(localStorage.getItem('mtte_crm_v2')) || { token: '', googleId: '' };
        let currentTab = 'agenda';
        let googleToken = null;
        let tokenClient = null;
        
        let dtableToken = null;
        let stUuid = null;
        let dtableServerUrl = null; 

        // --- GOOGLE ---
        function initGoogle() {
            if (typeof google !== 'undefined' && config.googleId) {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: config.googleId.trim(),
                    scope: 'https://www.googleapis.com/auth/contacts.readonly',
                    callback: (resp) => { if(resp.access_token) { googleToken = resp.access_token; fetchGoogleContacts(); } }
                });
                document.getElementById('google-status-msg').innerHTML = "<span class='text-blue-400'>✔ Google Conectado</span>";
            }
        }

        function handleAuthClick() {
            if (!tokenClient) initGoogle();
            tokenClient?.requestAccessToken();
        }

        async function fetchGoogleContacts() {
            const list = document.getElementById('google-list');
            list.innerHTML = '<div class="flex justify-center py-10"><div class="loading"></div></div>';
            try {
                const res = await fetch('https://people.googleapis.com/v1/people/me/connections?personFields=names,emailAddresses,phoneNumbers,organizations', {
                    headers: { 'Authorization': `Bearer ${googleToken}` }
                });
                const data = await res.json();
                list.innerHTML = data.connections?.map(p => `
                    <div onclick='openImport(${JSON.stringify(p).replace(/'/g, "&apos;")})' class="bg-slate-800/40 p-4 rounded-xl border border-white/5 hover:border-blue-500/50 cursor-pointer mb-2">
                        <div class="font-bold text-sm text-blue-50">${p.names?.[0]?.displayName || 'Sin nombre'}</div>
                        <div class="text-[10px] text-slate-500 uppercase">${p.organizations?.[0]?.name || 'Particular'}</div>
                    </div>
                `).join('') || '<p class="text-center py-10 opacity-40">No hay contactos.</p>';
            } catch (e) { list.innerHTML = '<p class="text-red-400 text-xs text-center">Error Google API</p>'; }
        }

        // --- SEATABLE: AUTODETECCIÓN DE SERVIDOR ---
        async function getSTAuth() {
            if (!config.token) return false;
            if (dtableToken && stUuid && dtableServerUrl) return true;

            try {
                const res = await fetch(`https://cloud.seatable.io/api/v2.1/dtable/app-access-token/`, {
                    headers: { 'Authorization': `Token ${config.token.trim()}` }
                });
                
                if (!res.ok) throw new Error("Token Inválido");
                
                const data = await res.json();
                dtableToken = data.access_token;
                stUuid = data.dtable_uuid;
                
                let baseUrl = data.dtable_server || 'https://cloud.seatable.io/dtable-server';
                dtableServerUrl = baseUrl.endsWith('/') ? baseUrl.slice(0, -1) : baseUrl;
                
                console.log("Conectado a SeaTable UUID:", stUuid);
                console.log("Servidor detectado:", dtableServerUrl);
                return true;
            } catch (e) {
                console.error("Error Auth SeaTable:", e);
                return false;
            }
        }

        async function stRequest(table, method = 'GET', body = null) {
            const authed = await getSTAuth();
            if (!authed) return { error: "auth" };

            // REPARACIÓN DE RUTA: Si el servidor es api-gateway, la ruta debe incluir dtable-server
            // Si el servidor ya es dtable-server, lo usamos directo.
            let fullUrl = "";
            if (dtableServerUrl.includes('api-gateway')) {
                fullUrl = `${dtableServerUrl}/dtable-server/api/v1/dtables/${stUuid}/rows/?table_name=${encodeURIComponent(table)}`;
            } else {
                fullUrl = `${dtableServerUrl}/api/v1/dtables/${stUuid}/rows/?table_name=${encodeURIComponent(table)}`;
            }
            
            try {
                const res = await fetch(fullUrl, {
                    method,
                    headers: { 
                        'Authorization': `Token ${dtableToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: body ? JSON.stringify(body) : null
                });

                if (res.status === 404) return { error: "404", table };
                if (!res.ok) throw new Error("Error en petición");
                
                return await res.json();
            } catch (e) {
                return { error: "fatal" };
            }
        }

        // --- CARGA DE DATOS ---
        async function loadData() {
            const container = document.getElementById('st-content');
            container.innerHTML = '<div class="flex justify-center py-20"><div class="loading"></div></div>';
            
            const tableName = currentTab === 'empresas' ? 'Empresas' : 'Contactos';
            const data = await stRequest(tableName);

            if (data.error === "auth") {
                renderError("Error de Configuración", "El App Token no es válido. Genéralo en SeaTable (Configuración de la Base > App Tokens).");
                return;
            }
            if (data.error === "404") {
                renderError("Tabla no encontrada", `No existe la tabla "<b>${tableName}</b>". Verifica que el nombre sea idéntico en SeaTable.`);
                return;
            }

            const rows = data.rows || [];
            if (currentTab === 'agenda') {
                container.innerHTML = rows.length ? rows.map(r => `
                    <div class="glass-card p-6 flex justify-between items-center border-l-4 border-l-blue-500 hover:bg-white/5 transition-all">
                        <div>
                            <div class="text-[10px] text-blue-400 font-bold uppercase mb-1">${r.Estado || 'NUEVO'}</div>
                            <h3 class="text-xl font-bold">${r['Nombre Apellido1'] || r.Nombre || 'Sin nombre'}</h3>
                            <p class="text-sm text-slate-400">${r['Nombre Empresa'] || 'Particular'}</p>
                        </div>
                        <a href="mailto:${r.email || ''}" class="bg-blue-600/20 text-blue-400 px-4 py-2 rounded-lg text-xs font-bold">Email</a>
                    </div>
                `).join('') : '<p class="text-center py-20 opacity-40">Agenda vacía.</p>';
            } else {
                renderTableView(rows);
            }
        }

        function renderTableView(rows) {
            if(!rows.length) { document.getElementById('st-content').innerHTML = '<p class="text-center py-20 opacity-40">Sin datos.</p>'; return; }
            const cols = Object.keys(rows[0]).filter(k => !k.startsWith('_'));
            let h = `<div class="glass-card overflow-hidden overflow-x-auto"><table class="w-full text-xs text-left">`;
            h += `<thead class="bg-slate-800 text-slate-500 uppercase font-bold"><tr>` + cols.map(c => `<th class="px-6 py-4">${c}</th>`).join('') + `</tr></thead>`;
            h += `<tbody class="divide-y divide-white/5">` + rows.map(r => `<tr>` + cols.map(c => `<td class="px-6 py-4 whitespace-nowrap">${r[c] || ''}</td>`).join('') + `</tr>`).join('') + `</tbody></table></div>`;
            document.getElementById('st-content').innerHTML = h;
        }

        function renderError(title, body) {
            document.getElementById('st-content').innerHTML = `<div class="text-center py-16 bg-red-500/5 rounded-3xl border border-red-500/20"><p class="text-red-400 font-bold mb-2">${title}</p><p class="text-xs text-slate-400">${body}</p></div>`;
        }

        // --- ACCIONES ---
        async function openImport(p) {
            document.getElementById('imp-nombre').value = p.names?.[0]?.displayName || '';
            document.getElementById('imp-email').value = p.emailAddresses?.[0]?.value || '';
            document.getElementById('imp-tel').value = p.phoneNumbers?.[0]?.value || '';
            document.getElementById('imp-emp-nombre').value = p.organizations?.[0]?.name || '';
            document.getElementById('imp-cargo').value = p.organizations?.[0]?.title || '';
            toggleModal('import-modal', true);

            const sel = document.getElementById('imp-select-empresa');
            sel.innerHTML = '<option value="NEW">Cargando empresas...</option>';
            const emps = await stRequest('Empresas');
            sel.innerHTML = '<option value="NEW">+ Crear Nueva Empresa</option>' + (emps.rows || []).map(e => `<option value="${e._id}">${e['Nombre Empresa']}</option>`).join('');
        }

        async function executeImport() {
            const btn = document.getElementById('btn-import');
            btn.disabled = true; btn.innerText = "Guardando...";

            let empId = document.getElementById('imp-select-empresa').value;
            let empNom = document.getElementById('imp-emp-nombre').value;

            if(empId === 'NEW') {
                const resE = await stRequest('Empresas', 'POST', { row: { "Nombre Empresa": empNom, "Tipo Empresa": document.getElementById('imp-emp-tipo').value } });
                if(resE?._id) empId = resE._id;
            }

            await stRequest('Contactos', 'POST', {
                row: {
                    "Nombre Apellido1": document.getElementById('imp-nombre').value,
                    "email": document.getElementById('imp-email').value,
                    "Teléfono Móvil": document.getElementById('imp-tel').value,
                    "Cargo": document.getElementById('imp-cargo').value,
                    "Nombre Empresa": empNom,
                    "Empresa": [empId],
                    "Estado": "Nuevo"
                }
            });

            btn.disabled = false; btn.innerText = "Importar al CRM";
            toggleModal('import-modal', false);
            changeTab('agenda');
        }

        function saveConfig() {
            config.token = document.getElementById('st-token').value;
            config.googleId = document.getElementById('google-id').value;
            localStorage.setItem('mtte_crm_v2', JSON.stringify(config));
            dtableToken = null; stUuid = null; dtableServerUrl = null;
            toggleModal('config-modal', false);
            initGoogle();
            loadData();
        }

        function toggleModal(id, show) { document.getElementById(id).classList.toggle('hidden', !show); }
        function toggleNuevaEmpresa(v) { document.getElementById('new-emp-fields').classList.toggle('hidden', v !== 'NEW'); }
        function changeTab(t) { currentTab = t; loadData(); }

        window.onload = () => { if(config.token) { loadData(); initGoogle(); } else { toggleModal('config-modal', true); } };
    </script>
</body>
</html>
