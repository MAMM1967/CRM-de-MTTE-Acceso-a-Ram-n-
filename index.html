<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTTE · CRM Comercial Frío Industrial</title>
    <!-- Google Identity Service -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #050a15; color: #e2e8f0; overflow-x: hidden; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; }
        .input-dark { background: #0f172a !important; border: 1px solid #3b82f6 !important; color: white !important; border-radius: 0.75rem !important; }
        .btn-primary { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4); }
        .loading { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10">

    <header class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10 gap-6 glass-card p-6">
        <div class="flex items-center gap-4">
            <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center shadow-2xl">
                <span class="text-white font-bold text-2xl italic">M</span>
            </div>
            <div>
                <h1 class="text-2xl font-bold tracking-tight">MTTE <span class="text-blue-500">CRM</span></h1>
                <p class="text-[10px] text-slate-400 uppercase tracking-widest font-semibold">Frío Industrial & Comercial</p>
            </div>
        </div>
        <div class="flex gap-4">
            <button id="auth-btn" onclick="handleAuthClick()" class="bg-white text-slate-900 px-6 py-2.5 rounded-xl font-bold text-sm shadow-lg hover:bg-slate-200 transition-colors">Google Contacts</button>
            <button onclick="toggleModal('config-modal', true)" class="p-2.5 bg-slate-800 rounded-xl border border-slate-700 hover:bg-slate-700 transition-all border-blue-500/30 shadow-[0_0_15px_rgba(59,130,246,0.2)]">⚙️</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        <aside class="lg:col-span-4">
            <div class="glass-card p-6 min-h-[500px]">
                <h2 class="text-xs font-bold text-blue-400 uppercase mb-6 tracking-widest flex items-center gap-2">
                    <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                    Contactos de Google
                </h2>
                <div id="google-list" class="space-y-3 overflow-y-auto max-h-[600px] pr-2">
                    <div id="google-status-msg" class="text-center py-10 opacity-40 italic text-sm">
                        Carga tu Client ID en el panel de configuración (⚙️).
                    </div>
                </div>
            </div>
        </aside>

        <section class="lg:col-span-8">
            <div class="flex gap-6 mb-6 font-bold text-sm uppercase tracking-wider border-b border-slate-800">
                <button onclick="changeTab('agenda')" id="tab-agenda" class="pb-3 border-b-2 border-blue-500 text-blue-500 transition-all">📅 Agenda</button>
                <button onclick="changeTab('empresas')" id="tab-empresas" class="pb-3 text-slate-500 transition-all">🏢 Empresas</button>
                <button onclick="changeTab('contactos')" id="tab-contactos" class="pb-3 text-slate-500 transition-all">👥 Todos</button>
            </div>
            <div id="st-content" class="space-y-4"></div>
        </section>
    </main>

    <!-- MODAL CONFIG -->
    <div id="config-modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="glass-card max-w-md w-full p-8 shadow-2xl border-blue-500/20">
            <h3 class="text-xl font-bold mb-2 text-center">Panel de Control</h3>
            <p class="text-center text-slate-400 text-xs mb-8 uppercase tracking-widest">Configuración de Conexiones</p>
            
            <div class="space-y-6">
                <!-- SEATABLE SECTION -->
                <div class="space-y-3">
                    <p class="text-[10px] font-bold text-blue-400 uppercase">SeaTable (Base de Datos)</p>
                    <div>
                        <input type="password" id="st-token" placeholder="App Token de la Base" class="w-full input-dark px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <input type="text" id="st-uuid" placeholder="UUID de la Base (de la URL)" class="w-full input-dark px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <!-- GOOGLE SECTION -->
                <div class="space-y-3 pt-4 border-t border-slate-800">
                    <p class="text-[10px] font-bold text-blue-400 uppercase">Google Cloud (Contactos)</p>
                    <div>
                        <input type="text" id="google-id" placeholder="Google Client ID (termina en .apps.googleusercontent.com)" class="w-full input-dark px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <div class="pt-4">
                    <button onclick="saveConfig()" class="w-full btn-primary py-4 rounded-xl font-bold shadow-lg shadow-blue-600/20">Guardar y Conectar Todo</button>
                    <button onclick="toggleModal('config-modal', false)" class="w-full text-slate-500 text-xs mt-4 hover:text-white transition-colors">Cerrar sin guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let config = JSON.parse(localStorage.getItem('mtte_crm_v1')) || { token: '', uuid: '', googleId: '' };
        let currentTab = 'agenda';
        let googleToken = null;
        let tokenClient = null;
        let dtableToken = null;

        // --- GOOGLE AUTH LOGIC ---
        function initGoogle() {
            if (typeof google !== 'undefined' && config.googleId) {
                try {
                    tokenClient = google.accounts.oauth2.initTokenClient({
                        client_id: config.googleId.trim(),
                        scope: 'https://www.googleapis.com/auth/contacts.readonly',
                        callback: (tokenResponse) => {
                            if (tokenResponse.access_token) {
                                googleToken = tokenResponse.access_token;
                                fetchGoogleContacts();
                            }
                        },
                    });
                    console.log("Google Client Initialized");
                    document.getElementById('google-status-msg').innerText = "Google listo. Pulsa el botón blanco arriba.";
                } catch (e) { 
                    console.error("Error init Google:", e); 
                    document.getElementById('google-status-msg').innerText = "Error en Client ID de Google.";
                }
            }
        }

        function handleAuthClick() {
            if (!config.googleId) {
                alert("Error: No has pegado el Google Client ID en el panel de configuración.");
                toggleModal('config-modal', true);
                return;
            }
            if (!tokenClient) initGoogle();
            if (tokenClient) {
                tokenClient.requestAccessToken({prompt: 'consent'});
            } else {
                alert("El servicio de Google aún está cargando. Espera 2 segundos.");
            }
        }

        async function fetchGoogleContacts() {
            const list = document.getElementById('google-list');
            list.innerHTML = '<div class="flex justify-center py-10"><div class="loading"></div></div>';
            try {
                const res = await fetch('https://people.googleapis.com/v1/people/me/connections?personFields=names,organizations', {
                    headers: { 'Authorization': `Bearer ${googleToken}` }
                });
                const data = await res.json();
                if (!data.connections) {
                    list.innerHTML = '<div class="text-center py-10 opacity-40">No se encontraron contactos en tu cuenta de Google.</div>';
                    return;
                }
                list.innerHTML = data.connections.map(p => `
                    <div class="bg-slate-800/40 p-4 rounded-xl border border-white/5 hover:border-blue-500/50 transition-all">
                        <div class="font-bold text-sm">${p.names?.[0]?.displayName || 'Sin nombre'}</div>
                        <div class="text-[10px] text-slate-500 uppercase">${p.organizations?.[0]?.name || 'Empresa no detectada'}</div>
                    </div>
                `).join('');
            } catch (e) { 
                list.innerHTML = '<div class="text-red-400 text-xs text-center p-4">Error de permisos. Revisa la consola de Google.</div>';
            }
        }

        // --- SEATABLE API LOGIC ---
        async function getSTToken() {
            if (!config.token) return null;
            if (dtableToken) return dtableToken; // Reutilizar token si ya existe

            try {
                const res = await fetch(`https://cloud.seatable.io/api/v2.1/dtable/app-access-token/`, {
                    headers: { 
                        'Accept': 'application/json',
                        'Authorization': `Token ${config.token.trim()}` 
                    }
                });
                
                if (!res.ok) throw new Error("Error de autorización inicial");
                const data = await res.json();
                dtableToken = data.access_token || data.dtable_token;
                return dtableToken;
            } catch (e) {
                console.error("Error SeaTable Token:", e);
                return null;
            }
        }

        async function stFetch(table) {
            const dtoken = await getSTToken();
            if (!dtoken) return { error: "auth", rows: [] };
            
            try {
                const url = `https://cloud.seatable.io/dtable-server/api/v1/dtables/${config.uuid.trim()}/rows/?table_name=${encodeURIComponent(table)}`;
                const res = await fetch(url, {
                    headers: { 'Authorization': `Token ${dtoken}` }
                });
                
                if (res.status === 404) {
                    // Si no encuentra la tabla, intentamos listar qué tablas HAY disponibles para diagnosticar
                    const infoRes = await fetch(`https://cloud.seatable.io/dtable-server/api/v1/dtables/${config.uuid.trim()}/metadata/`, {
                        headers: { 'Authorization': `Token ${dtoken}` }
                    });
                    const metadata = await infoRes.json();
                    const availableTables = metadata.metadata?.tables?.map(t => t.name).join(', ') || 'ninguna';
                    return { error: "not_found", table: table, found: availableTables };
                }

                if (!res.ok) throw new Error(`Fetch Error: ${res.status}`);
                return await res.json();
            } catch (e) { 
                console.error("ST Fetch Error:", e);
                return { error: "unknown", rows: [] }; 
            }
        }

        async function loadData() {
            const container = document.getElementById('st-content');
            container.innerHTML = '<div class="flex justify-center py-20"><div class="loading"></div></div>';
            
            const table = currentTab === 'empresas' ? 'Empresas' : 'Contactos';
            const data = await stFetch(table);
            
            if (data.error === "auth") {
                renderError("Error de Autenticación", "El Token de SeaTable es incorrecto o la base UUID no corresponde a ese token.");
                return;
            }
            
            if (data.error === "not_found") {
                renderError("Tabla no encontrada", `La tabla "${data.table}" no aparece en esta base.<br><br><b>Tablas detectadas en tu base:</b><br><span class="text-blue-400">${data.found}</span>`);
                return;
            }

            const rows = data.rows || [];

            if (currentTab === 'agenda') {
                container.innerHTML = rows.length > 0 ? rows.map(r => `
                    <div class="glass-card p-6 flex justify-between items-center border-l-4 border-l-blue-500 hover:bg-white/5 transition-all mb-4">
                        <div>
                            <div class="text-[10px] text-blue-400 font-bold uppercase mb-1">${r.Estado || 'NUEVO'}</div>
                            <h3 class="text-xl font-bold">${r['Nombre Apellido1'] || r.Nombre || 'Sin Nombre'}</h3>
                            <p class="text-sm text-slate-400">${r['Nombre Empresa'] || 'Particular'} · <span class="italic">${r.Cargo || 'Contacto'}</span></p>
                        </div>
                        <a href="mailto:${r.email || ''}" class="bg-blue-600/20 text-blue-400 px-6 py-2 rounded-xl text-xs font-bold hover:bg-blue-600 hover:text-white transition-all">Email</a>
                    </div>
                `).join('') : '<div class="text-center py-20 opacity-40 italic font-medium">No hay datos. Añade filas en SeaTable.</div>';
            } else {
                renderTable(rows);
            }
        }

        function renderError(title, msg) {
            document.getElementById('st-content').innerHTML = `
                <div class="text-center py-16 bg-red-500/5 rounded-3xl border border-red-500/20 px-6">
                    <div class="text-3xl mb-4">⚠️</div>
                    <p class="text-red-400 font-bold text-lg">${title}</p>
                    <p class="text-sm text-slate-400 mt-2 max-w-md mx-auto">${msg}</p>
                    <button onclick="toggleModal('config-modal', true)" class="mt-6 bg-slate-800 text-white px-6 py-2 rounded-xl text-xs font-bold hover:bg-slate-700 transition-all border border-white/10">Revisar Configuración</button>
                </div>
            `;
        }

        function renderTable(rows) {
            if (!rows.length) { document.getElementById('st-content').innerHTML = '<p class="text-center py-10 opacity-40">Sin datos en esta tabla.</p>'; return; }
            const keys = Object.keys(rows[0]).filter(k => !k.startsWith('_'));
            let html = `<div class="glass-card overflow-x-auto"><table class="w-full text-sm text-left"><thead class="bg-slate-800/50 text-slate-500 uppercase text-[10px] font-bold"><tr>`;
            keys.forEach(k => html += `<th class="px-6 py-4">${k}</th>`);
            html += `</tr></thead><tbody class="divide-y divide-white/5">`;
            rows.forEach(r => {
                html += `<tr class="hover:bg-white/5 transition-colors">`;
                keys.forEach(k => html += `<td class="px-6 py-4 whitespace-nowrap">${r[k] || '-'}</td>`);
                html += `</tr>`;
            });
            html += `</tbody></table></div>`;
            document.getElementById('st-content').innerHTML = html;
        }

        function toggleModal(id, show) { document.getElementById(id).classList.toggle('hidden', !show); }

        function changeTab(tab) {
            currentTab = tab;
            document.querySelectorAll('button[id^="tab-"]').forEach(b => b.className = "pb-3 text-slate-500 transition-all");
            document.getElementById('tab-'+tab).className = "pb-3 border-b-2 border-blue-500 text-blue-500 transition-all";
            loadData();
        }

        function saveConfig() {
            config.token = document.getElementById('st-token').value;
            config.uuid = document.getElementById('st-uuid').value;
            config.googleId = document.getElementById('google-id').value;
            dtableToken = null; // Forzar nuevo token al guardar
            localStorage.setItem('mtte_crm_v1', JSON.stringify(config));
            toggleModal('config-modal', false);
            initGoogle();
            loadData();
        }

        window.onload = () => {
            if(config.token && config.uuid) {
                document.getElementById('st-token').value = config.token;
                document.getElementById('st-uuid').value = config.uuid;
                document.getElementById('google-id').value = config.googleId || '';
                initGoogle();
                loadData();
            } else {
                toggleModal('config-modal', true);
            }
        };
    </script>
</body>
</html>
