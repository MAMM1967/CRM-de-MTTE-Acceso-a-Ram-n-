<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTTE · CRM Comercial</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #050a15; color: #e2e8f0; overflow-x: hidden; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; }
        .input-dark { background: #0f172a !important; border: 1px solid #3b82f6 !important; color: white !important; border-radius: 0.75rem !important; }
        .btn-primary { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); transition: all 0.3s ease; }
        .loading { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-8 gap-6 glass-card p-6">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                <span class="text-white font-bold text-xl italic">M</span>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight">MTTE <span class="text-blue-500 italic">INDUSTRIAL</span></h1>
                <div class="flex items-center gap-2">
                    <div id="status-dot" class="w-2 h-2 rounded-full bg-yellow-500"></div>
                    <p id="connection-status" class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Esperando Configuración</p>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button id="auth-btn" onclick="handleAuthClick()" class="bg-white text-slate-900 px-6 py-2.5 rounded-xl font-bold text-xs hover:bg-blue-50 transition-colors shadow-sm">Google Contacts</button>
            <button onclick="toggleModal('config-modal', true)" class="p-2.5 bg-slate-800 rounded-xl border border-blue-500/30 hover:bg-slate-700 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        <aside class="lg:col-span-4 space-y-6">
            <div class="glass-card p-6 min-h-[500px] flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-[10px] font-black text-blue-400 uppercase tracking-[0.2em]">Google Contacts</h2>
                    <span id="google-count" class="text-[10px] bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded-full font-bold">0</span>
                </div>
                <div id="google-list" class="space-y-3 overflow-y-auto max-h-[600px] pr-2 custom-scrollbar">
                    <div class="text-center py-20 opacity-30">
                        <p class="text-xs">Conecta con Google para importar</p>
                    </div>
                </div>
            </div>
        </aside>

        <section class="lg:col-span-8">
            <div class="flex gap-8 mb-6 font-bold text-[11px] uppercase border-b border-slate-800">
                <button onclick="changeTab('Agenda')" id="tab-Agenda" class="pb-3 tab-active tracking-widest">📅 Agenda Hoy</button>
                <button onclick="changeTab('Empresas')" id="tab-Empresas" class="pb-3 text-slate-500 hover:text-white tracking-widest">🏢 Empresas</button>
                <button onclick="changeTab('Contactos')" id="tab-Contactos" class="pb-3 text-slate-500 hover:text-white tracking-widest">👥 Todos los Contactos</button>
            </div>
            <div id="st-content" class="min-h-[400px]"></div>
        </section>
    </main>

    <!-- CONFIG MODAL -->
    <div id="config-modal" class="fixed inset-0 bg-slate-950/90 hidden flex items-center justify-center z-[100] p-4 backdrop-blur-md">
        <div class="glass-card max-w-md w-full p-8 shadow-2xl">
            <h3 class="text-xl font-bold mb-2">Configuración</h3>
            <div class="space-y-5">
                <div>
                    <label class="text-[10px] text-blue-400 font-bold uppercase ml-1">SeaTable API Token</label>
                    <input type="password" id="st-token" placeholder="dc7813d23b26d6a0b717232cf5b4e375d0af46b1" class="w-full input-dark px-4 py-3 mt-1.5 text-sm outline-none">
                    <p class="text-[9px] text-slate-500 mt-1 ml-1">Tu token: <code class="bg-black/30 px-1 rounded">dc78...46b1</code></p>
                </div>
                <div>
                    <label class="text-[10px] text-blue-400 font-bold uppercase ml-1">Base UUID (opcional)</label>
                    <input type="text" id="st-uuid" placeholder="a1b2c3d4-e5f6-7890-abcd-ef1234567890" class="w-full input-dark px-4 py-3 mt-1.5 text-sm outline-none">
                    <p class="text-[9px] text-slate-500 mt-1 ml-1">Cópialo de la URL de tu base en SeaTable</p>
                </div>
                <div>
                    <label class="text-[10px] text-blue-400 font-bold uppercase ml-1">Google Client ID</label>
                    <input type="text" id="google-id" placeholder="Client ID..." class="w-full input-dark px-4 py-3 mt-1.5 text-sm outline-none">
                </div>
                <div class="pt-4">
                    <button onclick="saveConfig()" class="w-full btn-primary py-4 rounded-xl font-bold text-sm text-white">Guardar y Recargar</button>
                    <button onclick="listMyDatabases()" class="w-full mt-2 bg-emerald-600 hover:bg-emerald-700 py-3 rounded-xl font-bold text-sm text-white transition-all">📋 Ver mis Bases de Datos</button>
                    <div id="db-list-result" class="mt-4 text-xs text-slate-400"></div>
                    <button onclick="toggleModal('config-modal', false)" class="w-full mt-4 text-slate-500 text-xs">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuración y variables de estado
        let config = JSON.parse(localStorage.getItem('mtte_crm_v3')) || { token: '', googleId: '' };
        let currentTab = 'Agenda';
        let googleToken = null;
        let tokenClient = null;

        // Para SeaTable Cloud, usamos el API Token directamente
        // El UUID se guarda separado para persistencia
        let savedUuid = localStorage.getItem('st_dtable_uuid') || '';
        let session = {
            apiToken: null,
            dtableUuid: savedUuid || null,
            serverUrl: 'https://cloud.seatable.io',
            authenticated: false
        };

        console.log('=== CONFIG INICIAL ===');
        console.log('Token en localStorage:', config.token ? config.token.substring(0, 15) + '...' : 'sin token');
        console.log('UUID en localStorage:', savedUuid);

        // Nombres de tablas estándar
        let TABLE_NAMES = {
            CONTACTOS: 'Contactos',
            EMPRESAS: 'Empresas'
        };

        function updateStatus(msg, colorClass, dotColor) {
            const el = document.getElementById('connection-status');
            const dot = document.getElementById('status-dot');
            if (el) { el.innerText = msg; el.className = `text-[10px] ${colorClass} uppercase tracking-widest font-bold`; }
            if (dot) { dot.className = `w-2 h-2 rounded-full ${dotColor}`; }
        }

        async function authenticateSeaTable() {
            if (!config.token) {
                updateStatus('Sin Token', 'text-red-500', 'bg-red-500');
                return false;
            }
            try {
                updateStatus('Conectando...', 'text-blue-400', 'bg-blue-400 animate-pulse');

                session.apiToken = config.token.trim();

                // Para API Token simple, necesitamos el dtable_uuid de la URL
                // Intentamos obtenerlo de la URL actual o pedirlo al usuario
                const urlParams = new URLSearchParams(window.location.search);
                session.dtableUuid = urlParams.get('dtable') || localStorage.getItem('st_dtable_uuid');

                // Si no tenemos UUID, listamos las bases de datos disponibles
                if (!session.dtableUuid) {
                    const res = await fetch('https://cloud.seatable.io/api/v2.1/workspaces/', {
                        headers: {
                            'Authorization': `Token ${session.apiToken}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        console.log('Workspaces:', data);
                        // Obtener la primera base de datos del primer workspace
                        if (data.workspace_list && data.workspace_list.length > 0) {
                            const ws = data.workspace_list[0];
                            // Obtener dtables del workspace
                            const res2 = await fetch(`https://cloud.seatable.io/api/v2.1/workspaces/${ws.id}/dtables/`, {
                                headers: {
                                    'Authorization': `Token ${session.apiToken}`,
                                    'Content-Type': 'application/json'
                                }
                            });
                            if (res2.ok) {
                                const data2 = await res2.json();
                                console.log('Dtables:', data2);
                                if (data2.dtable_list && data2.dtable_list.length > 0) {
                                    session.dtableUuid = data2.dtable_list[0].uuid;
                                    localStorage.setItem('st_dtable_uuid', session.dtableUuid);
                                    console.log('UUID obtenido:', session.dtableUuid);
                                }
                            }
                        }
                    } else {
                        console.error('Error workspaces:', res.status, await res.text());
                    }
                }

                if (!session.dtableUuid) {
                    throw new Error('No se pudo obtener el ID de la base de datos. Abre SeaTable, copia el UUID de la URL y pégalo en el campo "SeaTable UUID" opcional.');
                }

                updateStatus('Conectado', 'text-emerald-500', 'bg-emerald-500');
                return true;
            } catch (e) {
                console.error('Error conectando a SeaTable:', e);
                updateStatus(`Error: ${e.message}`, 'text-red-500', 'bg-red-500');
                return false;
            }
        }

        async function getAvailableTables() {
            if (!session.apiToken || !session.dtableUuid) return [];
            try {
                // Intentar metadata primero
                const res = await fetch(`https://cloud.seatable.io/api/v2.1/dtables/${session.dtableUuid}/metadata/`, {
                    headers: {
                        'Authorization': `Token ${session.apiToken}`,
                        'Content-Type': 'application/json'
                    }
                });
                if (res.ok) {
                    const data = await res.json();
                    return data.metadata?.tables?.map(t => t.name) || [];
                }
                // Si metadata falla (401), intentar con column-data que requiere menos permisos
                console.log('Metadata falló, intentando column-data...');
                const res2 = await fetch(`https://cloud.seatable.io/api/v2.1/dtables/${session.dtableUuid}/columns/`, {
                    headers: {
                        'Authorization': `Token ${session.apiToken}`,
                        'Content-Type': 'application/json'
                    }
                });
                if (res2.ok) {
                    const data2 = await res2.json();
                    // Extraer nombres únicos de tabla de las columnas
                    const tables = [...new Set(data2.map(c => c.table_name))];
                    console.log('Tablas desde columnas:', tables);
                    return tables;
                }
                return [];
            } catch (e) {
                console.error('Error obteniendo tablas:', e);
                return [];
            }
        }

        async function stRequest(tableName, method = 'GET', body = null) {
            if (!session.apiToken) {
                const ok = await authenticateSeaTable();
                if (!ok) return { error: 401 };
            }

            // Probar múltiples endpoints de SeaTable
            const endpoints = [
                // API v1 (más compatible con tokens básicos)
                `https://cloud.seatable.io/api/v1/dtables/${session.dtableUuid}/rows/?table_name=${encodeURIComponent(tableName)}`,
                // API v2.1
                `https://cloud.seatable.io/api/v2.1/dtables/${session.dtableUuid}/rows/?table_name=${encodeURIComponent(tableName)}`,
                // Endpoint alternativo sin query params
                `https://cloud.seatable.io/api/v1/dtables/${session.dtableUuid}/rows/?name=${encodeURIComponent(tableName)}`
            ];

            for (const url of endpoints) {
                try {
                    console.log(`Intentando: ${url}`);
                    const res = await fetch(url, {
                        method,
                        headers: {
                            'Authorization': `Token ${session.apiToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: body ? JSON.stringify(body) : null
                    });

                    console.log(`Respuesta ${tableName}:`, res.status, url);

                    if (res.status === 404) continue; // Probar siguiente endpoint
                    if (!res.ok) {
                        const errorText = await res.text();
                        console.error('Error HTTP:', res.status, errorText);
                        continue;
                    }

                    return await res.json();
                } catch (e) {
                    console.error('Error en endpoint:', url, e);
                    continue;
                }
            }

            // Si todos los endpoints fallan
            return { error: 404, tableName };
        }

        async function loadData() {
            const container = document.getElementById('st-content');
            container.innerHTML = '<div class="flex justify-center py-24"><div class="loading"></div></div>';

            // Primero autenticar y obtener UUID si no tenemos
            console.log('=== Iniciando carga de datos ===');
            console.log('Token:', config.token ? config.token.substring(0, 15) + '...' : 'sin token');
            console.log('UUID actual:', session.dtableUuid);

            // Asegurar autenticación primero
            if (!session.authenticated) {
                session.apiToken = config.token.trim();
                session.authenticated = true;
            }

            // Si no tenemos UUID, intentar obtenerlo
            if (!session.dtableUuid && session.apiToken) {
                console.log('Obteniendo UUID...');
                try {
                    const res = await fetch('https://cloud.seatable.io/api/v2.1/dtables/', {
                        headers: {
                            'Authorization': `Token ${session.apiToken}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        console.log('Dtables disponibles:', data);
                        if (data.dtable_list && data.dtable_list.length > 0) {
                            session.dtableUuid = data.dtable_list[0].uuid;
                            localStorage.setItem('st_dtable_uuid', session.dtableUuid);
                            console.log('UUID obtenido:', session.dtableUuid);
                        }
                    }
                } catch (e) {
                    console.error('Error obteniendo UUID:', e);
                }
            }

            if (!session.dtableUuid) {
                container.innerHTML = `
                    <div class="glass-card p-10 text-center border-yellow-500/30">
                        <h4 class="text-yellow-400 font-bold mb-4">⚠️ No se pudo obtener la base de datos</h4>
                        <p class="text-xs text-slate-400 mb-4">Necesitas pegar el UUID manualmente.</p>
                        <ol class="text-xs text-left inline-block space-y-2">
                            <li>1. Abre tu base en SeaTable</li>
                            <li>2. Copia el UUID de la URL:</li>
                            <li><code class="bg-black/40 px-2 py-1 rounded block mt-1">https://cloud.seatable.io/dtable/<strong>AQUI-EL-UUID</strong>/...</code></li>
                            <li>3. Pégalo en Configuración → Base UUID</li>
                        </ol>
                    </div>`;
                return;
            }

            console.log('UUID final:', session.dtableUuid);

            const tableToFetch = (currentTab === 'Empresas') ? TABLE_NAMES.EMPRESAS : TABLE_NAMES.CONTACTOS;
            console.log('Cargando tabla:', tableToFetch);

            const data = await stRequest(tableToFetch);

            if (data.error === 404) {
                const available = await getAvailableTables();
                container.innerHTML = `
                    <div class="glass-card p-10 text-center border-red-500/30">
                        <h4 class="text-red-400 font-bold mb-4">Error 404: Tabla "${tableToFetch}" no encontrada</h4>
                        <p class="text-xs text-slate-400 mb-6">SeaTable dice que esa tabla no existe en esta Base de Datos.</p>
                        <div class="bg-black/40 p-4 rounded-xl inline-block text-left">
                            <p class="text-[10px] text-blue-400 font-bold uppercase mb-2">Tablas detectadas en tu SeaTable:</p>
                            <ul class="text-xs space-y-1">
                                ${available.length > 0 ? available.map(t => `<li class="text-white">🔹 "${t}"</li>`).join('') : '<li class="text-slate-500">No se pudieron obtener tablas</li>'}
                            </ul>
                        </div>
                        <p class="text-[10px] mt-6 text-slate-500 italic">Asegúrate de que el nombre coincida exactamente (mayúsculas, minúsculas y espacios).</p>
                    </div>`;
                return;
            }

            if (data.error === 401) {
                container.innerHTML = '<div class="glass-card p-10 text-center"><p class="text-red-400 text-sm font-bold">❌ Token inválido o expirado</p><p class="text-xs text-slate-500 mt-2">Verifica tu App Token en la configuración</p></div>';
                return;
            }

            if (data.rows) renderData(data.rows);
            else container.innerHTML = '<div class="text-center py-24 opacity-20"><p class="text-xs italic">Sin registros o error en la respuesta</p></div>';
        }

        function renderData(rows) {
            const container = document.getElementById('st-content');
            if (!rows || !rows.length) {
                container.innerHTML = '<div class="text-center py-24 opacity-20"><p class="text-xs italic">Sin registros</p></div>';
                return;
            }

            if (currentTab === 'Agenda') {
                container.innerHTML = rows.slice(0, 20).map(r => `
                    <div class="glass-card p-5 mb-4 flex justify-between items-center border-l-4 border-blue-500 hover:bg-white/5 transition-all">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-blue-500/10 flex items-center justify-center text-blue-400 font-bold text-xs">
                                ${r.Nombre ? r.Nombre[0] : '?'}
                            </div>
                            <div>
                                <h3 class="font-bold text-sm">${r.Nombre || ''} ${r['Apellido 1'] || ''}</h3>
                                <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-0.5">${r['Nombre Empresa'] || 'PARTICULAR'}</p>
                            </div>
                        </div>
                    </div>
                `).join('');
            } else {
                const cols = Object.keys(rows[0]).filter(k => !k.startsWith('_'));
                container.innerHTML = `
                    <div class="glass-card overflow-hidden">
                        <div class="overflow-x-auto custom-scrollbar">
                            <table class="w-full text-[10px] text-left">
                                <thead class="bg-slate-800 text-blue-400 uppercase font-black">
                                    <tr>${cols.map(c => `<th class="p-5 whitespace-nowrap">${c}</th>`).join('')}</tr>
                                </thead>
                                <tbody class="divide-y divide-white/5">
                                    ${rows.map(r => `<tr class="hover:bg-white/[0.02]">${cols.map(c => `<td class="p-5 text-slate-300 whitespace-nowrap">${r[c] !== null ? r[c] : '-'}</td>`).join('')}</tr>`).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>`;
            }
        }

        function changeTab(t) {
            currentTab = t;
            ['Agenda','Empresas','Contactos'].forEach(id => {
                const btn = document.getElementById('tab-'+id);
                if(btn) btn.className = (id === t) ? 'pb-3 tab-active tracking-widest transition-all' : 'pb-3 text-slate-500 hover:text-white tracking-widest transition-all';
            });
            loadData();
        }

        function toggleModal(id, show) { document.getElementById(id).classList.toggle('hidden', !show); }

        function saveConfig() {
            config.token = document.getElementById('st-token').value.trim();
            config.googleId = document.getElementById('google-id').value.trim();
            const uuid = document.getElementById('st-uuid').value.trim();
            if (!config.token) {
                alert('⚠️ El token de SeaTable es requerido');
                return;
            }
            if (uuid) {
                localStorage.setItem('st_dtable_uuid', uuid);
            }
            localStorage.setItem('mtte_crm_v3', JSON.stringify(config));
            location.reload();
        }

        async function listMyDatabases() {
            const resultDiv = document.getElementById('db-list-result');
            const token = document.getElementById('st-token').value.trim() || config.token;

            if (!token) {
                resultDiv.innerHTML = '<span class="text-red-400">Primero ingresa tu token</span>';
                return;
            }

            resultDiv.innerHTML = '<span class="text-blue-400">Cargando...</span>';

            try {
                const res = await fetch('https://cloud.seatable.io/api/v2.1/dtables/', {
                    headers: {
                        'Authorization': `Token ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!res.ok) {
                    const error = await res.text();
                    resultDiv.innerHTML = `<span class="text-red-400">Error ${res.status}: ${error.substring(0, 50)}</span>`;
                    return;
                }

                const data = await res.json();
                console.log('Respuesta de SeaTable:', data);

                if (data.dtable_list && data.dtable_list.length > 0) {
                    resultDiv.innerHTML = `
                        <div class="bg-black/40 p-3 rounded-xl mt-2">
                            <p class="text-blue-400 font-bold mb-2">✅ Bases encontradas:</p>
                            <ul class="space-y-1">
                                ${data.dtable_list.map(db => `
                                    <li class="text-xs">
                                        <strong class="text-white">${db.name}</strong><br>
                                        <code class="text-emerald-400">${db.uuid}</code>
                                        <button onclick="selectUuid('${db.uuid}')" class="ml-2 text-[9px] bg-blue-600 px-2 py-0.5 rounded hover:bg-blue-500">Usar este</button>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = '<span class="text-yellow-400">No se encontraron bases de datos</span>';
                }
            } catch (e) {
                resultDiv.innerHTML = `<span class="text-red-400">Error: ${e.message}</span>`;
            }
        }

        function selectUuid(uuid) {
            document.getElementById('st-uuid').value = uuid;
            localStorage.setItem('st_dtable_uuid', uuid);
            alert('UUID seleccionado: ' + uuid + '\n\nAhora haz clic en "Guardar y Recargar"');
        }

        window.onload = () => {
            if (config.token) {
                document.getElementById('st-token').value = config.token;
                document.getElementById('google-id').value = config.googleId || '';
                document.getElementById('st-uuid').value = localStorage.getItem('st_dtable_uuid') || '';
                loadData();
            } else {
                toggleModal('config-modal', true);
            }
        };
    </script>
</body>
</html>
