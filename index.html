<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTTE · CRM Comercial</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #050a15; color: #e2e8f0; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; }
        .input-dark { background: #0f172a !important; border: 1px solid #3b82f6 !important; color: white !important; border-radius: 0.75rem !important; }
        .btn-primary { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); transition: all 0.3s ease; }
        .loading { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <header class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-8 gap-6 glass-card p-6">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center">
                <span class="text-white font-bold text-xl italic">M</span>
            </div>
            <div>
                <h1 class="text-xl font-bold">MTTE <span class="text-blue-500">CRM</span></h1>
                <p id="connection-status" class="text-[10px] text-yellow-500 uppercase tracking-widest font-semibold">Desconectado</p>
            </div>
        </div>
        <div class="flex gap-3">
            <button id="auth-btn" onclick="handleAuthClick()" class="bg-white text-slate-900 px-5 py-2 rounded-lg font-bold text-xs">Google Contacts</button>
            <button onclick="toggleModal('config-modal', true)" class="p-2 bg-slate-800 rounded-lg border border-blue-500/30">⚙️</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        <aside class="lg:col-span-4">
            <div class="glass-card p-5 min-h-[400px]">
                <h2 class="text-[10px] font-bold text-blue-400 uppercase mb-4 tracking-widest">Contactos de Google</h2>
                <div id="google-list" class="space-y-2 overflow-y-auto max-h-[500px]">
                    <p class="text-center py-10 opacity-30 text-xs">Conecta Google para ver contactos</p>
                </div>
            </div>
        </aside>

        <section class="lg:col-span-8">
            <div class="flex gap-6 mb-6 font-bold text-xs uppercase border-b border-slate-800">
                <button onclick="changeTab('agenda')" id="tab-agenda" class="pb-2 tab-active">📅 Agenda</button>
                <button onclick="changeTab('empresas')" id="tab-empresas" class="pb-2 text-slate-500">🏢 Empresas</button>
                <button onclick="changeTab('contactos')" id="tab-contactos" class="pb-2 text-slate-500">👥 Todos</button>
            </div>
            <div id="st-content"></div>
        </section>
    </main>

    <!-- CONFIG MODAL -->
    <div id="config-modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-50 p-4">
        <div class="glass-card max-w-sm w-full p-6">
            <h3 class="text-lg font-bold mb-4">Configuración</h3>
            <div class="space-y-4">
                <p class="text-[10px] text-slate-400 uppercase">Credenciales SeaTable Cloud</p>
                <input type="password" id="st-token" placeholder="SeaTable App Token" class="w-full input-dark px-4 py-2 text-sm">
                <input type="text" id="google-id" placeholder="Google Client ID" class="w-full input-dark px-4 py-2 text-sm">
                <button onclick="saveConfig()" class="w-full btn-primary py-3 rounded-lg font-bold text-sm text-white shadow-lg shadow-blue-500/20">Guardar y Conectar</button>
                <button onclick="toggleModal('config-modal', false)" class="w-full text-slate-400 text-xs hover:text-white transition-colors">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        // Configuración persistente en localStorage
        let config = JSON.parse(localStorage.getItem('mtte_crm_v3')) || { token: '', googleId: '' };
        let currentTab = 'agenda';
        let googleToken = null;
        let tokenClient = null;
        
        let session = {
            accessToken: null,
            dtableUuid: null,
            serverUrl: 'https://dtable-server.seatable.io' // Servidor por defecto para Cloud
        };

        function updateStatus(msg, color = 'text-blue-400') {
            const el = document.getElementById('connection-status');
            if (el) {
                el.innerText = msg;
                el.className = `text-[10px] ${color} uppercase tracking-widest font-semibold`;
            }
        }

        // Paso 1: Autenticación con SeaTable Cloud
        async function authenticateSeaTable() {
            if (!config.token) {
                updateStatus('Falta Token', 'text-yellow-500');
                return false;
            }
            
            updateStatus('Autenticando...');
            
            try {
                const res = await fetch('https://cloud.seatable.io/api/v2.1/dtable/app-access-token/', {
                    method: 'GET',
                    headers: { 
                        'Authorization': `Token ${config.token.trim()}`,
                        'Accept': 'application/json'
                    }
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error_msg || 'Error de autenticación');
                }
                
                const data = await res.json();
                session.accessToken = data.access_token;
                session.dtableUuid = data.dtable_uuid;
                
                // Determinamos el servidor correcto (Cloud usa dtable-server.seatable.io)
                if (data.dtable_server) {
                    session.serverUrl = data.dtable_server.replace(/\/$/, "");
                }
                
                updateStatus('Conectado', 'text-emerald-500');
                return true;
            } catch (e) {
                console.error("Auth Error:", e);
                updateStatus('Error de Conexión', 'text-red-500');
                return false;
            }
        }

        // Paso 2: Obtención de filas
        async function fetchRows(tableName) {
            // Si no hay token de sesión, lo obtenemos
            if (!session.accessToken) {
                const ok = await authenticateSeaTable();
                if (!ok) return { error: 401, msg: "Token de App inválido o expirado" };
            }

            // IMPORTANTE: Ruta de API oficial para lectura de filas
            const url = `${session.serverUrl}/api/v1/dtables/${session.dtableUuid}/rows/?table_name=${encodeURIComponent(tableName.trim())}`;
            
            try {
                const res = await fetch(url, {
                    method: 'GET',
                    headers: { 
                        'Authorization': `Token ${session.accessToken}`,
                        'Accept': 'application/json'
                    }
                });

                if (res.status === 404) {
                    return { error: 404, msg: `La pestaña "${tableName}" no existe en SeaTable.` };
                }

                if (!res.ok) {
                    // Si el token de sesión caducó, lo limpiamos para reintentar en la próxima carga
                    if (res.status === 403) session.accessToken = null;
                    throw new Error(`Error HTTP ${res.status}`);
                }
                
                return await res.json();
            } catch (e) {
                console.error("Fetch Error:", e);
                return { error: 500, msg: "No se pudo conectar con el servidor de datos." };
            }
        }

        async function loadData() {
            const container = document.getElementById('st-content');
            if (!container) return;
            
            container.innerHTML = '<div class="flex justify-center py-20"><div class="loading"></div></div>';

            // Mapeo según la pestaña seleccionada
            const tableName = (currentTab === 'empresas') ? 'Empresas' : 'Contactos';
            const result = await fetchRows(tableName);

            if (result && result.error) {
                container.innerHTML = `
                    <div class="text-center py-12 glass-card border-red-500/30 max-w-md mx-auto">
                        <div class="text-red-500 text-3xl mb-4 text-center">⚠️</div>
                        <h3 class="text-red-400 font-bold mb-2">Error de Sincronización</h3>
                        <p class="text-xs text-slate-400 px-6">${result.msg}</p>
                        <button onclick="loadData()" class="mt-8 bg-blue-600 hover:bg-blue-500 text-white text-[10px] px-8 py-2.5 rounded-full font-bold uppercase tracking-wider transition-all">Reintentar</button>
                    </div>`;
                return;
            }

            renderData(result ? (result.rows || []) : []);
        }

        function renderData(rows) {
            const container = document.getElementById('st-content');
            if (!rows.length) {
                container.innerHTML = `
                    <div class="text-center py-20 opacity-20 italic">
                        <p class="text-xs">Esta tabla está vacía o no tiene registros visibles.</p>
                    </div>`;
                return;
            }

            if (currentTab === 'agenda') {
                container.innerHTML = rows.map(r => `
                    <div class="glass-card p-5 mb-3 flex justify-between items-center border-l-4 border-blue-500 hover:translate-x-1 transition-all">
                        <div>
                            <h3 class="font-bold text-sm text-white">${r.Nombre || ''} ${r['Apellido 1'] || ''}</h3>
                            <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-1">${r['Nombre Empresa'] || 'Particular'}</p>
                        </div>
                        <div class="flex gap-2">
                            ${r.Email ? `<a href="mailto:${r.Email}" class="p-2 bg-blue-500/10 text-blue-400 rounded-lg hover:bg-blue-500 hover:text-white transition-all text-[10px] font-bold">Email</a>` : ''}
                        </div>
                    </div>
                `).join('');
            } else {
                const cols = Object.keys(rows[0]).filter(k => !k.startsWith('_'));
                container.innerHTML = `
                    <div class="glass-card overflow-hidden border border-white/5 shadow-2xl">
                        <div class="overflow-x-auto">
                            <table class="w-full text-[11px] text-left">
                                <thead class="bg-slate-800/80 text-blue-400 uppercase font-bold tracking-tighter">
                                    <tr>${cols.map(c => `<th class="p-4 whitespace-nowrap">${c}</th>`).join('')}</tr>
                                </thead>
                                <tbody class="divide-y divide-white/5">
                                    ${rows.map(r => `<tr>${cols.map(c => `<td class="p-4 text-slate-300 whitespace-nowrap">${r[c] || '-'}</td>`).join('')}</tr>`).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>`;
            }
        }

        // --- GOOGLE CONTACTS ---
        function initGoogle() {
            if (window.google && config.googleId) {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: config.googleId.trim(),
                    scope: 'https://www.googleapis.com/auth/contacts.readonly',
                    callback: (resp) => { if(resp.access_token) { googleToken = resp.access_token; fetchGoogleContacts(); } }
                });
            }
        }

        function handleAuthClick() {
            if (!tokenClient) initGoogle();
            if (tokenClient) tokenClient.requestAccessToken();
            else alert("Configura primero el Client ID de Google");
        }

        async function fetchGoogleContacts() {
            const list = document.getElementById('google-list');
            list.innerHTML = '<div class="flex justify-center py-10"><div class="loading"></div></div>';
            try {
                const res = await fetch('https://people.googleapis.com/v1/people/me/connections?personFields=names,emailAddresses,organizations', {
                    headers: { 'Authorization': `Bearer ${googleToken}` }
                });
                const data = await res.json();
                list.innerHTML = data.connections?.map(p => `
                    <div class="bg-white/5 p-4 rounded-xl border border-white/5 hover:border-blue-500/40 transition-all mb-2">
                        <div class="font-bold text-xs text-white">${p.names?.[0]?.displayName || 'Sin nombre'}</div>
                        <div class="text-[9px] text-slate-500 uppercase mt-1 font-semibold">${p.organizations?.[0]?.name || 'Particular'}</div>
                    </div>
                `).join('') || '<p class="text-center py-10 opacity-30 text-xs">No hay contactos.</p>';
            } catch (e) { list.innerHTML = '<p class="text-red-400 text-[10px] text-center">Error en API Google</p>'; }
        }

        // --- UTILIDADES ---
        function saveConfig() {
            config.token = document.getElementById('st-token').value.trim();
            config.googleId = document.getElementById('google-id').value.trim();
            localStorage.setItem('mtte_crm_v3', JSON.stringify(config));
            
            session.accessToken = null; // Forzamos nueva autenticación
            toggleModal('config-modal', false);
            loadData();
            initGoogle();
        }

        function toggleModal(id, show) {
            const m = document.getElementById(id);
            if (m) m.classList.toggle('hidden', !show);
        }
        
        function changeTab(t) {
            currentTab = t;
            ['agenda', 'empresas', 'contactos'].forEach(id => {
                const el = document.getElementById('tab-' + id);
                if (el) el.className = (id === t) ? 'pb-2 tab-active' : 'pb-2 text-slate-500 hover:text-white transition-colors';
            });
            loadData();
        }

        window.onload = () => {
            const tInput = document.getElementById('st-token');
            const gInput = document.getElementById('google-id');
            if (tInput) tInput.value = config.token;
            if (gInput) gInput.value = config.googleId;
            
            if (config.token) {
                loadData();
            } else {
                toggleModal('config-modal', true);
            }
            
            if (config.googleId) {
                setTimeout(initGoogle, 1000);
            }
        };
    </script>
</body>
</html>
